<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawsStore - Каталог</title>
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/catalog.css">
</head>
<body data-page="catalog">
  <div id="app">
    <header id="site-header"></header>
    <main>
      <section class="catalog-hero">
        <div class="container">
          <h1>Shop All Products</h1>
          <p>Discover the best products for your furry friends</p>
        </div>
      </section>

      <section class="container catalog-layout">
        <aside id="catalog-filters" class="catalog-sidebar"></aside>
        <section class="catalog-content">
          <div id="catalog-toolbar" class="catalog-toolbar"></div>
          <section id="catalog-grid" class="catalog-grid"></section>
        </section>
      </section>
    </main>
    <footer id="site-footer"></footer>
  </div>

  <script src="./js/app.js" type="module"></script>
  <script src="./js/catalog.js" type="module"></script>
</body>
</html>
